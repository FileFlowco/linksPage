<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* animated background */

.bg{
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.08),transparent 50%),
radial-gradient(circle at 70% 70%,rgba(255,255,255,0.06),transparent 50%);
animation:move 20s linear infinite;
z-index:-1;
}

@keyframes move{
0%{transform:translate(0,0)}
50%{transform:translate(-5%,5%)}
100%{transform:translate(0,0)}
}

/* main layout */

.container{
width:90%;
max-width:900px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:28px;
}

/* logo */

.logo{
width:250px;
max-width:60vw;
margin-bottom:10px;
animation:fade 1.2s ease forwards;
opacity:0;
}

@keyframes fade{
0%{
opacity:0;
transform:translateY(12px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* title */

.title{
font-size:52px;
font-weight:600;
letter-spacing:-1px;
}

.subtitle{
font-size:16px;
color:#a0a0a0;
}

/* links */

.links{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:22px;
margin-top:10px;
}

.links a{
text-decoration:none;
color:white;
font-size:18px;
font-weight:500;
position:relative;
transition:.3s;
}

.links a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:1px;
background:white;
transition:.3s;
}

.links a:hover::after{
width:100%;
}

/* big CTA */

.cta{
margin-top:10px;
font-size:22px;
font-weight:500;
letter-spacing:.3px;
}

.cta a{
color:white;
text-decoration:none;
position:relative;
}

.cta a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:100%;
height:1px;
background:white;
opacity:.6;
}

/* mobile */

@media(max-width:600px){

.title{
font-size:36px;
}

.subtitle{
font-size:14px;
}

.links{
gap:16px;
}

.links a{
font-size:16px;
}

.cta{
font-size:20px;
}

}

@media (max-width:768px){

body{
align-items:flex-start;
padding-top:14vh;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<img src="assets/logonobackg.png" class="logo">

<div class="title">FileFlow</div>

<div class="subtitle">
Engineering software that survives reality
</div>

<div class="cta">
<a href="https://booking-one-lac.vercel.app/">Book a Consultation</a>
</div>

<div class="links">

<a href="https://fileflowco.com">Website</a>

<a href="https://instagram.com/file.flowco">Instagram</a>

<a href="https://www.linkedin.com/in/file-flow-7781143ab">LinkedIn</a>

<a href="mailto:fileflowinc@gmail.com">Email</a>

</div>

</div>

</body>
</html>
